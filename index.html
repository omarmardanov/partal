<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartFind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:     #0d0d0b;
      --g900:      #1c1c1a;
      --g700:      #4a4a46;
      --g500:      #888880;
      --g300:      #ccccc4;
      --g200:      #e0e0d8;
      --g100:      #f2f2ee;
      --g50:       #f9f9f6;
      --white:     #ffffff;
      --green:     #2e7d55;
      --green-bg:  #eaf4ef;
      --amber:     #a05c00;
      --amber-bg:  #fff4e5;
      --red:       #b83232;
      --red-bg:    #fdf0f0;
      --font-d:    'DM Serif Display', Georgia, serif;
      --font-b:    'DM Sans', system-ui, sans-serif;
      --r:         12px;
      --r-sm:      8px;
      --shadow:    0 2px 12px rgba(0,0,0,0.07);
    }

    html, body, #root {
      height: 100%;
      font-family: var(--font-b);
      color: var(--black);
      background: var(--g100);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LAYOUT ─── */
    .app {
      min-height: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--white);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOP NAV ─── */
    .topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--g100);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav-logo {
      font-family: var(--font-d);
      font-size: 20px;
      color: var(--black);
      cursor: pointer;
    }
    .topnav-logo span { font-style: italic; color: var(--g500); }
    .mode-toggle {
      display: flex;
      background: var(--g100);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      font-family: var(--font-b);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      color: var(--g500);
      transition: all .18s;
    }
    .mode-btn.active {
      background: var(--white);
      color: var(--black);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ─── MAIN ─── */
    .main { flex: 1; overflow-y: auto; }

    /* ─── BUYER HOME ─── */
    .home-wrap {
      padding: 36px 24px 32px;
      display: flex;
      flex-direction: column;
      min-height: calc(100dvh - 56px);
    }
    .home-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--g500);
      margin-bottom: 8px;
    }
    .home-headline {
      font-family: var(--font-d);
      font-size: clamp(52px, 14vw, 68px);
      line-height: 1.0;
      margin-bottom: 40px;
      animation: fadeUp .5s ease both;
    }
    .home-headline em { font-style: italic; color: var(--g400, #6a6a62); }

    .search-box {
      position: relative;
      margin-bottom: 10px;
      animation: fadeUp .5s .08s ease both;
    }
    .search-input {
      width: 100%;
      font-family: var(--font-b);
      font-size: 16px;
      font-weight: 300;
      color: var(--black);
      background: var(--g100);
      border: 2px solid transparent;
      border-radius: var(--r);
      padding: 16px 52px 16px 18px;
      outline: none;
      transition: border-color .2s, background .2s;
      line-height: 1.4;
    }
    .search-input:focus { border-color: var(--g300); background: var(--white); }
    .search-input::placeholder { color: var(--g500); }
    .search-go {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 34px; height: 34px;
      background: var(--black);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .15s;
    }
    .search-go:hover { background: var(--g700); transform: translateY(-50%) scale(1.06); }

    .search-hint {
      font-size: 12px;
      color: var(--g500);
      line-height: 1.5;
      padding: 0 2px;
      animation: fadeUp .5s .14s ease both;
    }

    .recent-section { margin-top: 32px; animation: fadeUp .5s .2s ease both; }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--g500);
      margin-bottom: 12px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      font-family: var(--font-b);
      font-size: 13px;
      color: var(--g700);
      background: var(--g100);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .chip:hover { background: var(--g200); }

    .home-footer {
      margin-top: auto;
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .text-link {
      font-size: 13px;
      color: var(--g500);
      background: none;
      border: none;
      border-bottom: 1px solid var(--g300);
      cursor: pointer;
      font-family: var(--font-b);
      padding-bottom: 1px;
      transition: color .15s;
    }
    .text-link:hover { color: var(--black); }
    .online-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--g500);
    }
    .dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

    /* ─── RESULTS ─── */
    .results-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--g100);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 50;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--g500);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-b);
      padding: 0;
      margin-bottom: 12px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--black); }
    .results-title {
      font-family: var(--font-d);
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .param-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .param-chip {
      font-size: 12px;
      color: var(--g700);
      background: var(--g100);
      border: none;
      border-radius: 20px;
      padding: 5px 10px 5px 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-family: var(--font-b);
      transition: background .15s;
    }
    .param-chip:hover { background: var(--g200); }
    .chip-x { color: var(--g400, #9a9a92); font-size: 15px; line-height: 1; }

    .results-meta {
      padding: 10px 20px;
      font-size: 12px;
      color: var(--g500);
      border-bottom: 1px solid var(--g100);
    }
    .no-results {
      padding: 48px 24px;
      text-align: center;
    }
    .no-results-icon { font-size: 40px; margin-bottom: 16px; }
    .no-results h3 { font-family: var(--font-d); font-size: 22px; margin-bottom: 8px; }
    .no-results p { font-size: 14px; color: var(--g500); line-height: 1.5; }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--g100);
      cursor: pointer;
      transition: background .12s;
    }
    .result-item:hover { background: var(--g50); }
    .result-left { flex: 1; min-width: 0; }
    .result-name { font-size: 15px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
    .result-sub { font-size: 13px; color: var(--g500); font-weight: 300; }
    .result-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .result-price { font-size: 16px; font-weight: 500; }
    .result-price.no-price { font-size: 13px; color: var(--g400, #9a9a92); font-style: italic; font-weight: 300; }
    .avail {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--g500);
    }
    .avail-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .avail-dot.green { background: var(--green); }
    .avail-dot.grey  { background: var(--g300); }

    /* ─── SHEET ─── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,13,11,.3);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed;
      bottom: 0; left: 50%; 
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 90dvh;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      transition: transform .36s cubic-bezier(.32,.72,0,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sheet.open { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--g200);
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
      cursor: pointer;
    }
    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 40px;
      scrollbar-width: none;
    }
    .sheet-body::-webkit-scrollbar { display: none; }
    .sheet-cat { font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--g500); margin-bottom: 6px; }
    .sheet-title { font-family: var(--font-d); font-size: 28px; line-height: 1.2; margin-bottom: 24px; }
    .field-table { margin-bottom: 24px; }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 11px 0;
      border-bottom: 1px solid var(--g100);
    }
    .field-row:first-child { border-top: 1px solid var(--g100); }
    .field-lbl { font-size: 12px; color: var(--g500); text-transform: uppercase; letter-spacing: .06em; }
    .field-val { font-size: 14px; text-align: right; }
    .field-val.big { font-family: var(--font-d); font-size: 24px; }
    .field-val.green { color: var(--green); }
    .seller-box {
      background: var(--g50);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .seller-box-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; display: flex; align-items: center; gap: 7px; }
    .seller-box-meta { font-size: 12px; color: var(--g500); }
    .cta-btn {
      width: 100%;
      padding: 17px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--r);
      font-family: var(--font-b);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .15s;
      margin-bottom: 10px;
    }
    .cta-btn:hover { background: var(--g700); }
    .cta-btn.secondary {
      background: var(--g100);
      color: var(--black);
      font-size: 14px;
      padding: 14px;
    }
    .cta-btn.secondary:hover { background: var(--g200); }

    /* ─── SELLER DASHBOARD ─── */
    .dash-wrap { padding: 28px 24px 40px; }
    .dash-toprow { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; }
    .icon-btn {
      width: 36px; height: 36px;
      background: var(--g100);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .icon-btn:hover { background: var(--g200); }
    .dash-hello { font-family: var(--font-d); font-size: 50px; line-height: 1; margin-bottom: 4px; }
    .dash-seller-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .seller-name { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--g700); }
    .last-update { font-size: 11px; color: var(--g500); text-align: right; line-height: 1.4; }
    .last-update strong { display: block; font-size: 12px; color: var(--g700); }

    .stats-row { display: flex; margin-bottom: 32px; }
    .stat {
      flex: 1;
      text-align: center;
      padding: 0 8px;
      border-right: 1px solid var(--g200);
    }
    .stat:first-child { text-align: left; padding-left: 0; }
    .stat:last-child { border-right: none; text-align: right; padding-right: 0; }
    .stat-num { font-family: var(--font-d); font-size: 38px; line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--g500); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    .action-row { display: flex; gap: 10px; margin-bottom: 32px; }
    .act-btn {
      flex: 1;
      padding: 14px 16px;
      border: none;
      border-radius: var(--r);
      font-family: var(--font-b);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      line-height: 1.3;
      transition: background .15s;
    }
    .act-btn sub { display: block; font-size: 11px; font-weight: 300; opacity: .65; margin-top: 2px; }
    .act-btn.primary { background: var(--black); color: var(--white); }
    .act-btn.primary:hover { background: var(--g700); }
    .act-btn.secondary { background: var(--g100); color: var(--black); }
    .act-btn.secondary:hover { background: var(--g200); }

    /* ─── PRODUCT TABLE ─── */
    .table-header {
      display: grid;
      grid-template-columns: 1fr 72px 80px;
      gap: 10px;
      padding: 8px 12px;
      background: var(--g50);
      border-radius: var(--r-sm) var(--r-sm) 0 0;
      border: 1px solid var(--g200);
      border-bottom: none;
    }
    .th { font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--g500); }
    .th.right { text-align: right; }

    .table-body { border: 1px solid var(--g200); border-radius: 0 0 var(--r-sm) var(--r-sm); overflow: hidden; }
    .table-row {
      display: grid;
      grid-template-columns: 1fr 72px 80px;
      gap: 10px;
      padding: 13px 12px;
      border-bottom: 1px solid var(--g100);
      align-items: center;
      cursor: pointer;
      transition: background .1s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--g50); }
    .td-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-sub { font-size: 12px; color: var(--g500); font-weight: 300; margin-top: 1px; }
    .td-price { font-size: 14px; text-align: right; }
    .td-price.na { color: var(--g400, #9a9a92); font-style: italic; font-size: 12px; }
    .td-status { text-align: right; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      border-radius: 20px;
      padding: 3px 9px;
    }
    .badge-live    { background: var(--green-bg); color: var(--green); }
    .badge-draft   { background: var(--g100);     color: var(--g500); }
    .badge-pending { background: var(--amber-bg); color: var(--amber); }

    /* ─── FORM ─── */
    .form-screen { padding: 0; }
    .form-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--g100);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 50;
    }
    .form-title { font-family: var(--font-d); font-size: 22px; }
    .form-body { padding: 24px 20px 40px; }
    .form-section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--g500);
      margin: 24px 0 14px;
    }
    .form-section-title:first-child { margin-top: 0; }
    .field-group-form { display: flex; flex-direction: column; gap: 12px; }
    .field-wrap { display: flex; flex-direction: column; gap: 5px; }
    .field-label-form {
      font-size: 12px;
      font-weight: 500;
      color: var(--g700);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .field-label-form span { font-weight: 300; color: var(--g400,#9a9a92); font-style: italic; text-transform: none; letter-spacing: 0; }
    .form-input, .form-select {
      font-family: var(--font-b);
      font-size: 15px;
      color: var(--black);
      background: var(--g100);
      border: 2px solid transparent;
      border-radius: var(--r-sm);
      padding: 12px 14px;
      outline: none;
      width: 100%;
      transition: border-color .2s, background .2s;
      font-weight: 300;
    }
    .form-input:focus, .form-select:focus { border-color: var(--g300); background: var(--white); }
    .form-input::placeholder { color: var(--g400, #9a9a92); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-footer {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }
    .btn {
      font-family: var(--font-b);
      font-size: 14px;
      font-weight: 500;
      padding: 14px 20px;
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary { background: var(--black); color: var(--white); flex: 2; }
    .btn-primary:hover { background: var(--g700); }
    .btn-secondary { background: var(--g100); color: var(--black); flex: 1; }
    .btn-secondary:hover { background: var(--g200); }
    .btn-danger { background: var(--red-bg); color: var(--red); flex: 1; }
    .btn-danger:hover { background: #fce5e5; }

    /* ─── UPLOAD ─── */
    .upload-screen { padding: 24px 20px 40px; }
    .upload-zone {
      border: 2px dashed var(--g200);
      border-radius: var(--r);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 20px;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--g300); background: var(--g50); }
    .upload-zone.drag { border-color: var(--black); background: var(--g50); }
    .upload-icon { font-size: 36px; margin-bottom: 12px; }
    .upload-main { font-family: var(--font-d); font-size: 20px; margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: var(--g500); line-height: 1.5; }
    .upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    .file-info {
      background: var(--g50);
      border: 1px solid var(--g200);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .file-icon { font-size: 24px; }
    .file-name { font-size: 14px; font-weight: 500; }
    .file-meta { font-size: 12px; color: var(--g500); }

    .analyze-btn {
      width: 100%;
      padding: 16px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: var(--r);
      font-family: var(--font-b);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 12px;
    }
    .analyze-btn:hover { background: var(--g700); }
    .analyze-btn:disabled { background: var(--g300); cursor: not-allowed; }

    /* ─── REVIEW ─── */
    .review-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--g100);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 50;
    }
    .review-title { font-family: var(--font-d); font-size: 24px; margin-bottom: 12px; }
    .summary-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      font-size: 12px;
      font-weight: 500;
      border-radius: 20px;
      padding: 4px 11px;
    }
    .pill-ok   { background: var(--green-bg); color: var(--green); }
    .pill-warn { background: var(--amber-bg); color: var(--amber); }
    .pill-err  { background: var(--red-bg);   color: var(--red); }

    .mapping-section {
      padding: 16px 20px;
      background: var(--g50);
      border-bottom: 1px solid var(--g100);
    }

  "timing belt": "Timing belt", "ремень": "Timing belt", "timing": "Timing belt",
  "water pump": "Water pump", "помпа": "Water pump",
  "starter": "Starter motor", "стартер": "Starter motor",
  "compressor": "AC compressor", "кондиционер": "AC compressor",
};

function parseQuery(raw) {
  const q = raw.toLowerCase().trim();
  const tokens = q.split(/[\s,\-\/]+/);
  const params = { brand: null, model: null, year: null, engine: null, partType: null };

  // Part type — try multi-word first
  for (const alias of Object.keys(PART_ALIASES).sort((a,b) => b.length - a.length)) {
    if (q.includes(alias)) { params.partType = PART_ALIASES[alias]; break; }
  }

  // Brand
  for (const t of tokens) {
    if (BRAND_ALIASES[t]) { params.brand = BRAND_ALIASES[t]; break; }
  }

  // Model
  for (const t of tokens) {
    if (MODEL_ALIASES[t]) { params.model = MODEL_ALIASES[t]; break; }
  }

  // Year — 4-digit number in range
  const yearMatch = q.match(/\b(19[5-9]\d|20[0-2]\d)\b/);
  if (yearMatch) params.year = parseInt(yearMatch[1]);

  // Engine
  const engineMatch = q.match(/\b(\d+\.\d+)\b/);
  if (engineMatch) params.engine = engineMatch[1];

  return params;
}

function matchProducts(products, params) {
  if (!params.brand && !params.model && !params.partType) return [];
  return products.filter(p => {
    let score = 0;
    if (params.partType && p.partType === params.partType) score += 3;
    if (params.brand && p.brand === params.brand) score += 2;
    if (params.model && p.model === params.model) score += 2;
    if (params.year && p.yearFrom && p.yearTo) {
      if (params.year >= p.yearFrom && params.year <= p.yearTo) score += 1;
    }
    if (params.engine && p.engine && p.engine.includes(params.engine)) score += 1;
    return score >= 2;
  }).sort((a, b) => {
    // in_stock first, then by price asc
    if (a.availability === b.availability) return (a.price || 9999) - (b.price || 9999);
    return a.availability === "in_stock" ? -1 : 1;
  });
}

};

const CANONICAL_LABELS = {
  partName: "Part name",
  brand: "Brand",
  model: "Model",
  year: "Year",
  engine: "Engine",
  price: "Price",
  condition: "Condition",
  availability: "Availability",
  notes: "Notes",
};

function inferColumns(headers) {
  return headers.map(h => {
    const low = h.toLowerCase().trim();
    const inferred = COLUMN_INFERENCE[low];
    return {
      original: h,
      inferred: inferred !== undefined ? inferred : "ignore",
      confidence: inferred !== undefined ? (inferred === null ? "warn" : "ok") : "warn",
    };
  });
}

function normalizeRows(rows, mappings) {
  return rows.slice(0, 20).map((row, i) => { // limit preview to 20
    const obj = {};
    mappings.forEach(m => {
      if (m.inferred && m.inferred !== "ignore") {
        obj[m.inferred] = row[m.original] || null;
      }
    });

    // Derive status
    let status = "ok", issue = "All fields mapped";
    const criticalMissing = !obj.partName;
    const hasWarn = !obj.brand && !obj.model;
    const isEmpty = Object.values(obj).every(v => !v);

    if (isEmpty) { status = "err"; issue = "Empty row"; }
    else if (criticalMissing) { status = "err"; issue = "Part name missing"; }
    else if (hasWarn) { status = "warn"; issue = "Brand/model unclear"; }
    else if (!obj.price) { status = "warn"; issue = "Price not found"; }

    return { ...obj, _id: i, _status: status, _issue: issue };
  });
}

function ResultsPage({ query, products, sellers, onBack, onProduct }) {
  const [params, setParams] = useState(() => parseQuery(query));
  const [results, setResults] = useState([]);

  useEffect(() => {
    setResults(matchProducts(products, params));
  }, [params]);

  const removeParam = key => setParams(p => ({ ...p, [key]: null }));

  const activeParams = Object.entries(params).filter(([, v]) => v !== null);
  const sellerMap = Object.fromEntries(sellers.map(s => [s.id, s]));

  const paramLabels = { brand: "Brand", model: "Model", year: "Year", engine: "Engine", partType: "Part" };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"calc(100dvh - 56px)"}}>
      <div className="results-header">
        <button className="back-btn" onClick={onBack}>
          <Icon name="arrowLeft" size={14} strokeWidth={2} />
          Back
        </button>
        <div className="results-title">
          {params.partType || "Parts"}{params.brand ? ` · ${params.brand}` : ""}{params.model ? ` ${params.model}` : ""}
        </div>
        <div className="param-chips">
          {activeParams.map(([k, v]) => (
            <ParamChip key={k} label={paramLabels[k]} value={String(v)} onRemove={() => removeParam(k)} />
          ))}
        </div>
      </div>

      <div className="results-meta">
        {results.length === 0
          ? "No listings found"
          : `${results.length} listing${results.length !== 1 ? "s" : ""} found`
        }
      </div>

      {results.length === 0 ? (
        <div className="no-results">
          <div className="no-results-icon">🔍</div>
          <h3>No results</h3>

  );
}

function UploadScreen({ onBack, onReview }) {
  const [file, setFile] = useState(null);
  const [drag, setDrag] = useState(false);
  const [parsing, setParsing] = useState(false);

  const handleFile = f => {
    if (!f) return;
    const ext = f.name.split(".").pop().toLowerCase();
    if (!["csv","xls","xlsx"].includes(ext)) { alert("Please upload a CSV, XLS, or XLSX file."); return; }
    setFile(f);
  };

  const handleDrop = e => {
    e.preventDefault(); setDrag(false);
    handleFile(e.dataTransfer.files[0]);
  };

  const analyze = () => {
    setParsing(true);
    // Use PapaParse for CSV, mock for XLS
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: (result) => {
          setTimeout(() => { // artificial delay for UX
            const mappings = inferColumns(result.meta.fields || []);
            const rows = normalizeRows(result.data, mappings);
            setParsing(false);
            onReview({ mappings, rows, fileName: file.name, rowCount: result.data.length });
          }, 1200);
        }
      });
    } else {
      // Mock XLS data
      setTimeout(() => {
        const mockHeaders = ["Наименование товара", "Марка/Модель/год", "Цена GEL", "Остаток", "Примечания"];
        const mockRows = [
          {"Наименование товара":"Radiator Peugeot 308","Марка/Модель/год":"Peugeot 308 2016","Цена GEL":"185","Остаток":"есть","Примечания":""},
          {"Наименование товара":"Alternator Lada Granta","Марка/Модель/год":"Lada Granta 2019 1.6","Цена GEL":"120","Остаток":"есть","Примечания":"used"},
          {"Наименование товара":"Тормозные колодки","Марка/Модель/год":"","Цена GEL":"55","Остаток":"есть","Примечания":"mixed"},
          {"Наименование товара":"","Марка/Модель/год":"","Цена GEL":"","Остаток":"","Примечания":""},
          {"Наименование товара":"Oil filter Toyota Camry","Марка/Модель/год":"Toyota 2020","Цена GEL":"18","Остаток":"нет","Примечания":""},
          {"Наименование товара":"Shock absorber front","Марка/Модель/год":"Hyundai Accent 2017","Цена GEL":"","Остаток":"есть","Примечания":"new"},
        ];
        const mappings = inferColumns(mockHeaders);
        const rows = normalizeRows(mockRows, mappings);
        setParsing(false);
        onReview({ mappings, rows, fileName: file.name, rowCount: mockRows.length });
      }, 1400);
    }
  };

  return (
    <div className="upload-screen">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <button className="icon-btn" onClick={onBack}><Icon name="arrowLeft" size={16} strokeWidth={2} /></button>
        <div style={{fontFamily:"var(--font-d)",fontSize:22}}>Upload inventory</div>
      </div>

      <div className={`upload-zone ${drag ? "drag" : ""}`}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={handleDrop}
      >
        <input type="file" accept=".csv,.xls,.xlsx" className="upload-input"
          onChange={e => handleFile(e.target.files[0])} />
        <div className="upload-icon">📁</div>
        <div className="upload-main">Drop your file here</div>
        <div className="upload-sub">CSV, XLS or XLSX · Any column names<br />AI will figure out the structure</div>
      </div>

      {file && (
        <div className="file-info">
          <div className="file-icon">📄</div>
          <div>
            <div className="file-name">{file.name}</div>
            <div className="file-meta">{(file.size / 1024).toFixed(1)} KB · Ready to analyze</div>
          </div>
        </div>
      )}

      <button className="analyze-btn" disabled={!file || parsing} onClick={analyze}>
        {parsing ? <span className="loading-dots">Analyzing</span> : "Analyze with AI"}
      </button>

      <div style={{fontSize:12,color:"var(--g500)",lineHeight:1.6,textAlign:"center"}}>
        No reformatting needed. The system maps your columns automatically.<br />
        You review and approve before anything goes live.
      </div>

      {/* Demo CSV download */}
      <div style={{marginTop:24,textAlign:"center"}}>
        <button className="text-link" onClick={() => {
          const csv = `Part name,Brand,Model,Year,Price,Condition,Availability\nRadiator OEM,Peugeot,308,2016,185,New,in stock\nAlternator used,Lada,Granta,,120,Used,in stock\nBrake pads,,,,55,New,on order\nOil filter,Toyota,Camry,2020,18,New,in stock`;
          const blob = new Blob([csv], {type:"text/csv"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a"); a.href=url; a.download="sample_inventory.csv"; a.click();
        }}>Download sample CSV</button>
      </div>
    </div>
  );
}

function ReviewScreen({ data, onBack, onPublish }) {
  const [tab, setTab] = useState("all");
  const [mappings, setMappings] = useState(data.mappings);
  const [rows] = useState(data.rows);

  const okRows   = rows.filter(r => r._status === "ok");
  const warnRows = rows.filter(r => r._status === "warn");
  const errRows  = rows.filter(r => r._status === "err");

  const displayRows = tab === "all" ? rows : tab === "warn" ? warnRows : errRows;

  const updateMapping = (i, val) => {
    setMappings(m => m.map((item, idx) => idx === i ? { ...item, inferred: val, confidence: "ok" } : item));
  };

  const canonicalOptions = ["partName","brand","model","year","engine","price","condition","availability","notes","ignore"];

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"calc(100dvh - 56px)"}}>
      <div className="review-header">
        <button className="back-btn" onClick={onBack}>
          <Icon name="arrowLeft" size={14} strokeWidth={2} /> Back
        </button>
        <div className="review-title">Review data</div>
        <div className="summary-pills">
          <span className="pill pill-ok">✓ {okRows.length} ready</span>
          {warnRows.length > 0 && <span className="pill pill-warn">⚠ {warnRows.length} uncertain</span>}
          {errRows.length > 0  && <span className="pill pill-err">✕ {errRows.length} failed</span>}
        </div>
      </div>

      <div className="mapping-section">
        <div className="section-label" style={{marginBottom:12}}>Column mapping — AI inferred</div>
        <div className="mapping-grid">
          {mappings.map((m, i) => (
            <div key={i} className="mapping-row">
              <div className="m-orig" title={m.original}>{m.original}</div>
              <div className="m-arrow">→</div>
              <select
                style={{
                  fontFamily:"var(--font-b)", fontSize:12, fontWeight:500,
                  background: m.confidence === "ok" ? "var(--green-bg)" : "var(--amber-bg)",
                  color: m.confidence === "ok" ? "var(--green)" : "var(--amber)",
                  border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer",
                  width:"100%"
                }}
                value={m.inferred || "ignore"}
                onChange={e => updateMapping(i, e.target.value)}
              >
                {canonicalOptions.map(o => (
                  <option key={o} value={o}>{CANONICAL_LABELS[o] || (o === "ignore" ? "Ignore" : o)}</option>
                ))}
              </select>
            </div>
          ))}
        </div>
      </div>

      <div className="review-tabs">
        <button className={`rtab ${tab==="all"?"active":""}`} onClick={() => setTab("all")}>All ({rows.length})</button>
        {warnRows.length > 0 && <button className={`rtab ${tab==="warn"?"active":""}`} onClick={() => setTab("warn")}>Uncertain ({warnRows.length})</button>}
        {errRows.length > 0  && <button className={`rtab ${tab==="err"?"active":""}`}  onClick={() => setTab("err")}>Failed ({errRows.length})</button>}
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
        {displayRows.map((row, i) => (
          <div key={i} className={`review-row ${row._status !== "ok" ? row._status : ""}`}>
            <div>
              <div className="rr-name">{row.partName || <em style={{color:"var(--g400,#9a9a92)"}}>No name</em>}</div>
              <div className={`rr-issue ${row._status}`}>{row._issue}</div>
            </div>
            <div className="rr-price">
              {row.price ? `₾ ${row.price}` : <span style={{color:"var(--g400,#9a9a92)"}}>—</span>}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <div className={`status-circle sc-${row._status}`} />
            </div>
          </div>
        ))}
      </div>

      <div className="review-footer">
        <button className="btn btn-secondary" style={{flex:1}} onClick={onBack}>Save drafts</button>
        <button className="btn btn-primary" style={{flex:2}} onClick={() => onPublish(okRows.length)}>
          Publish {okRows.length} rows →
        </button>
      </div>
    </div>
  );
}

    setMode(m);
    setScreen(m === "buyer" ? "home" : "dashboard");
    setSelectedProduct(null);
  };

  // ─── Buyer handlers ───
  const handleSearch = (q) => { setSearchQuery(q); setScreen("results"); };

  // ─── Seller handlers ───
  const handleSaveProduct = (form) => {
    if (editingProduct?.id) {
      setProducts(ps => ps.map(p => p.id === editingProduct.id ? { ...p, ...form } : p));
      showToast(form._status === "draft" ? "Saved as draft" : "Product updated ✓");
    } else {
      const newP = { ...form, id: Date.now(), sellerId: MY_SELLER_ID, yearFrom: form.yearFrom ? Number(form.yearFrom) : null, yearTo: form.yearTo ? Number(form.yearTo) : null };
      setProducts(ps => [...ps, newP]);
      showToast(form._status === "draft" ? "Saved as draft" : "Product published ✓");
    }
    setScreen("dashboard");
    setEditingProduct(null);
  };

  const handleDeleteProduct = (id) => {
    if (!window.confirm("Delete this product?")) return;
    setProducts(ps => ps.filter(p => p.id !== id));
    setScreen("dashboard");
    setEditingProduct(null);
    showToast("Product deleted");
  };

  const handlePublishUpload = (count) => {
    showToast(`${count} listings published ✓`);
    setScreen("dashboard");
    setUploadData(null);
  };

  // ─── Render ───
  const renderBuyer = () => {
    if (screen === "results") {
      return <ResultsPage query={searchQuery} products={products} sellers={sellers}
        onBack={() => setScreen("home")} onProduct={setSelectedProduct} />;
    }
    return <BuyerHome onSearch={handleSearch} onSellerMode={() => switchMode("seller")} />;
  };

  const renderSeller = () => {
    if (screen === "form") {
      return <ProductForm product={editingProduct} onSave={handleSaveProduct}
        onDelete={handleDeleteProduct} onBack={() => { setScreen("dashboard"); setEditingProduct(null); }} />;
    }
    if (screen === "upload") {
      return <UploadScreen onBack={() => setScreen("dashboard")} onReview={d => { setUploadData(d); setScreen("review"); }} />;
    }
    if (screen === "review" && uploadData) {
      return <ReviewScreen data={uploadData} onBack={() => setScreen("upload")}
        onPublish={handlePublishUpload} />;
    }
    return <SellerDashboard products={products} sellers={sellers}
      onAdd={() => { setEditingProduct(null); setScreen("form"); }}
      onEdit={p => { setEditingProduct(p); setScreen("form"); }}
      onUpload={() => setScreen("upload")} />;
  };

  return (
    <div className="app">
      <nav className="topnav">
        <div className="topnav-logo" onClick={() => switchMode(mode)}>
          Part<span>Find</span>
        </div>
        <div className="mode-toggle">
          <button className={`mode-btn ${mode==="buyer"?"active":""}`} onClick={() => switchMode("buyer")}>Search</button>
          <button className={`mode-btn ${mode==="seller"?"active":""}`} onClick={() => switchMode("seller")}>My Shop</button>
        </div>
      </nav>

      <main className="main">
        {mode === "buyer" ? renderBuyer() : renderSeller()}
      </main>

      {selectedProduct && (
        <ProductSheet
          product={selectedProduct}
          seller={sellers.find(s => s.id === selectedProduct.sellerId)}
          onClose={() => setSelectedProduct(null)}
        />
      )}

      {toast && <Toast message={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
